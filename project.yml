name: Absumo
options:
  bundleIdPrefix: fi.meshly
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Absumo:
    type: application
    platform: iOS
    sources:
      - path: Absumo
    info:
      path: Absumo/Info.plist
      properties:
        CFBundleDisplayName: Absumo
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: Absumo records your voice only on-device, so you can play it back and compare it with the model pronunciation. Nothing is uploaded.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.meshly.absumo
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  AbsumoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AbsumoTests
    dependencies:
      - target: Absumo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.meshly.absumo.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Absumo:
    build:
      targets:
        Absumo: all
        AbsumoTests: [test]
    test:
      targets:
        - AbsumoTests
